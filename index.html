<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered tool for generating comprehensive educational lesson plans">
    <meta property="og:title" content="AI Lesson Generator">
    <meta property="og:description" content="Create comprehensive lesson plans powered by AI">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://ai-lesson-generator.vercel.app/">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <title>AI Lesson Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" crossorigin="anonymous" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js" crossorigin="anonymous" defer></script>
</head>
<body>
    <a href="#lessonForm" class="skip-link">Skip to form</a>
    <div class="container">
        <header>
            <h1>🎓 AI Lesson Generator</h1>
            <p class="subtitle">Create comprehensive lesson plans powered by AI</p>
        </header>

        <main>
            <div class="form-container">
                <form id="lessonForm">
                    <div class="form-group">
                        <label for="topic">Lesson Topic *</label>
                        <input
                            type="text"
                            id="topic"
                            name="topic"
                            placeholder="e.g., Photosynthesis, World War II, Fractions"
                            maxlength="200"
                            required
                        >
                        <small>Enter the main topic or subject for your lesson</small>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="grade">Grade Level</label>
                            <select id="grade" name="grade">
                                <option value="">Select grade</option>
                                <option value="Kindergarten">Kindergarten</option>
                                <option value="1st Grade">1st Grade</option>
                                <option value="2nd Grade">2nd Grade</option>
                                <option value="3rd Grade">3rd Grade</option>
                                <option value="4th Grade">4th Grade</option>
                                <option value="5th Grade">5th Grade</option>
                                <option value="6th Grade">6th Grade</option>
                                <option value="7th Grade">7th Grade</option>
                                <option value="8th Grade">8th Grade</option>
                                <option value="9th Grade">9th Grade</option>
                                <option value="10th Grade">10th Grade</option>
                                <option value="11th Grade">11th Grade</option>
                                <option value="12th Grade">12th Grade</option>
                                <option value="College">College</option>
                                <option value="Adult Education">Adult Education</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input
                                type="text"
                                id="subject"
                                name="subject"
                                placeholder="e.g., Science, History, Math"
                                maxlength="100"
                            >
                        </div>

                        <div class="form-group">
                            <label for="duration">Duration (minutes)</label>
                            <input
                                type="number"
                                id="duration"
                                name="duration"
                                placeholder="e.g., 45"
                                min="1"
                                max="480"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="learningObjectives">Learning Objectives (Optional)</label>
                        <textarea
                            id="learningObjectives"
                            name="learningObjectives"
                            rows="3"
                            maxlength="2000"
                            placeholder="Enter specific learning objectives, one per line..."
                        ></textarea>
                        <small>What should students learn? Leave blank for AI to generate.</small>
                    </div>

                    <button type="submit" id="generateBtn" class="btn-primary">
                        <span class="btn-text">Generate Lesson Plan</span>
                        <span class="btn-loader" style="display: none;">⏳</span>
                    </button>
                </form>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <div id="lessonPlanContainer" class="lesson-plan-container" style="display: none;">
                <div class="lesson-plan-header">
                    <h2>Generated Lesson Plan</h2>
                    <button id="copyBtn" class="btn-secondary">Copy to Clipboard</button>
                </div>
                <div id="lessonPlan" class="lesson-plan"></div>
            </div>
        </main>

        <footer>
            <p>Powered by <a href="https://www.anthropic.com/" target="_blank" rel="noopener">Anthropic Claude</a></p>
            <p>
                <a href="https://github.com/Cartooli/ai-lesson-plan-generator" target="_blank" rel="noopener">View on GitHub</a> | 
                <a href="https://github.com/Cartooli/ai-lesson-plan-generator#readme" target="_blank" rel="noopener">Documentation</a>
            </p>
        </footer>
    </div>

    <script src="js/app.js" defer></script>
</body>
</html>
